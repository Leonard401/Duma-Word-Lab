<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DUMA Docs</title>
    <style>
      :root {
        --bg-top: #1a1a2e;
        --bg-bottom: #0f3460;
        --panel: rgba(255, 255, 255, 0.08);
        --panel-border: rgba(255, 255, 255, 0.14);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --accent: #4ecca3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background: linear-gradient(145deg, var(--bg-top), #16213e, var(--bg-bottom));
      }

      main {
        width: min(920px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0 56px;
      }

      .hero,
      .card {
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(20px);
      }

      .hero {
        padding: 28px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 6vw, 58px);
        line-height: 0.95;
        letter-spacing: 0.04em;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      }

      .card {
        display: block;
        padding: 22px;
        text-decoration: none;
        color: inherit;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .title {
        margin: 10px 0 8px;
        font-size: 24px;
        font-weight: 900;
      }

      .url {
        margin-top: 12px;
        color: var(--accent);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>DUMA<br />Docs</h1>
        <p>
          Pagina de documentatie statica pregatita pentru GitHub Pages.
          Politica de confidentialitate publica pentru Google Play poate fi
          servita din <strong>/privacy-policy/</strong>.
        </p>
      </section>

      <section class="grid">
        <a class="card" href="./privacy-policy/">
          <div class="eyebrow">Google Play</div>
          <div class="title">Privacy Policy</div>
          <p>
            Varianta publica, multilingva, pregatita pentru publicare pe GitHub
            Pages.
          </p>
          <div class="url">Deschide /privacy-policy/</div>
        </a>
      </section>
    </main>
  </body>
</html>
