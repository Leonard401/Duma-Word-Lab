<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DUMA Privacy Policy</title>
    <style>
      :root {
        --bg-top: #1a1a2e;
        --bg-bottom: #0f3460;
        --panel: rgba(255, 255, 255, 0.08);
        --panel-border: rgba(255, 255, 255, 0.14);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --accent: #4ecca3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background: linear-gradient(145deg, var(--bg-top), #16213e, var(--bg-bottom));
      }

      main {
        width: min(960px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      .hero {
        padding: 24px;
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(20px);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(32px, 6vw, 56px);
        line-height: 0.95;
        letter-spacing: 0.04em;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 18px 0 0;
      }

      .tab {
        border: 1px solid var(--panel-border);
        border-radius: 999px;
        padding: 10px 16px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      .tab.active {
        background: rgba(78, 204, 163, 0.22);
        border-color: rgba(78, 204, 163, 0.52);
      }

      .panel {
        margin-top: 18px;
        padding: 24px;
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(18px);
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: inherit;
        color: var(--text);
        line-height: 1.7;
      }

      .note {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(78, 204, 163, 0.10);
        border: 1px solid rgba(78, 204, 163, 0.18);
        color: var(--muted);
      }

      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>DUMA<br />Privacy Policy</h1>
        <p>
          Pagina statica pregatita pentru publicare pe GitHub Pages pentru
          politica de confidentialitate DUMA.
        </p>
        <p style="margin-top: 10px">
          URL public asteptat:
          <strong>https://leonard401.github.io/Duma-Word-Lab/privacy-policy/</strong>
        </p>
        <div class="tabs" role="tablist" aria-label="Privacy policy language">
          <button class="tab active" data-lang="ro" type="button">Romana</button>
          <button class="tab" data-lang="en" type="button">English</button>
          <button class="tab" data-lang="es" type="button">Espanol</button>
        </div>
      </section>

      <section class="panel">
        <pre id="content">Se incarca politica de confidentialitate...</pre>
        <div class="note">
          Fisiere sursa:
          <a href="../privacy-policy.ro.md">RO</a>,
          <a href="../privacy-policy.en.md">EN</a>,
          <a href="../privacy-policy.es.md">ES</a>
        </div>
      </section>
    </main>

    <script>
      const files = {
        ro: "../privacy-policy.ro.md",
        en: "../privacy-policy.en.md",
        es: "../privacy-policy.es.md",
      };

      const content = document.getElementById("content");
      const buttons = Array.from(document.querySelectorAll(".tab"));

      function sanitizeMarkdown(text) {
        return text.replace(/^#{1,6}\s+/gm, "");
      }

      async function loadPolicy(language) {
        buttons.forEach((button) => {
          button.classList.toggle("active", button.dataset.lang === language);
        });

        content.textContent = "Se incarca...";

        try {
          const response = await fetch(files[language], { cache: "no-store" });
          const text = await response.text();
          content.textContent = sanitizeMarkdown(text);
          document.documentElement.lang = language;
        } catch (error) {
          content.textContent =
            "Politica de confidentialitate nu a putut fi incarcata.";
        }
      }

      buttons.forEach((button) => {
        button.addEventListener("click", () => loadPolicy(button.dataset.lang));
      });

      loadPolicy("ro");
    </script>
  </body>
</html>
